<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>设置与模式切换</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
    --bg-light:#fdfdfd;
    --bg-dark:#1e1e1e;
    --text-light:#222;
    --text-dark:#eee;
    --accent:#4a90e2;
    --radius:8px;
}
html{font-size:16px;}
body{
    margin:0;
    padding:0;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    background:var(--bg-light);
    color:var(--text-light);
    transition:background .3s, color .3s;
}
.container{
    max-width:800px;
    margin:0 auto;
    padding:1rem;
}
h1{
    text-align:center;
    margin:1rem 0;
}
.setting{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0.75rem 1rem;
    margin:0.5rem 0;
    background:rgba(0,0,0,0.05);
    border-radius:var(--radius);
}
.setting label{
    flex:1;
    margin-right:1rem;
}
.toggle{
    position:relative;
    width:44px;
    height:24px;
}
.toggle input{
    opacity:0;
    width:0;
    height:0;
}
.slider{
    position:absolute;
    cursor:pointer;
    top:0; left:0; right:0; bottom:0;
    background:#ccc;
    border-radius:24px;
    transition:.4s;
}
.slider:before{
    position:absolute;
    content:"";
    height:20px; width:20px;
    left:2px; bottom:2px;
    background:#fff;
    border-radius:50%;
    transition:.4s;
}
input:checked + .slider{
    background:var(--accent);
}
input:checked + .slider:before{
    transform:translateX(20px);
}
button{
    padding:0.5rem 1rem;
    font-size:1rem;
    border:none;
    border-radius:var(--radius);
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    transition:background .2s;
}
button:hover{
    background:#357ab8;
}
#topBtn{
    position:fixed;
    right:1.5rem;
    bottom:1.5rem;
    display:none;
    width:48px;
    height:48px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:50%;
    font-size:1.5rem;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:1000;
}
@media (max-width:600px){
    .setting{
        flex-direction:column;
        align-items:flex-start;
    }
    .setting label{
        margin-bottom:0.5rem;
    }
}
</style>
<meta name="description" content="提供暗/亮模式切换、字体大小调节、页面滚动返回顶部按钮；保存用户偏好至本地存储，刷新后自动恢复。"><meta name="keywords" content="古诗词,Web应用,诗词检索,诗词解析,古典文学,朝代筛选,作者分类,主题搜索"><meta name="robots" content="index,follow,max-image-preview:large"><meta property="og:type" content="website"><meta property="og:title" content="设置与模式切换"><meta property="og:description" content="提供暗/亮模式切换、字体大小调节、页面滚动返回顶部按钮；保存用户偏好至本地存储，刷新后自动恢复。"><meta name="twitter:card" content="summary"><meta name="twitter:title" content="设置与模式切换"><meta name="twitter:description" content="提供暗/亮模式切换、字体大小调节、页面滚动返回顶部按钮；保存用户偏好至本地存储，刷新后自动恢复。"><script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"设置与模式切换","description":"提供暗/亮模式切换、字体大小调节、页面滚动返回顶部按钮；保存用户偏好至本地存储，刷新后自动恢复。","applicationCategory":"UtilitiesApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"CNY"}}</script></head>
<body>
<div class="container">
    <h1>设置与模式切换</h1>
    <div class="setting">
        <label for="themeToggle">暗/亮模式</label>
        <label class="toggle">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
    </div>
    <div class="setting">
        <label for="fontSize">字体大小</label>
        <input type="range" id="fontSize" min="14" max="24" step="1" value="16">
    </div>
    <div class="setting">
        <button id="resetBtn">恢复默认</button>
    </div>
    <p style="margin-top:2rem;">
        这里是示例内容，用于展示设置效果。<br>
        采菊东篱下，悠然见南山。<br>
        明月几时有，把酒问青天。<br>
        春眠不觉晓，处处闻啼鸟。
    </p>
</div>

<button id="topBtn" title="返回顶部">↑</button>

<script>
(function(){
    const root = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const fontSizeInput = document.getElementById('fontSize');
    const resetBtn = document.getElementById('resetBtn');
    const topBtn = document.getElementById('topBtn');

    // 初始化
    function init(){
        const theme = localStorage.getItem('theme')||'light';
        const fontSize = localStorage.getItem('fontSize')||'16';
        applyTheme(theme);
        themeToggle.checked = (theme==='dark');
        fontSizeInput.value = fontSize;
        applyFontSize(fontSize);
    }

    function applyTheme(mode){
        if(mode==='dark'){
            root.style.setProperty('--bg-light', 'var(--bg-dark)');
            root.style.setProperty('--bg-dark', '#1e1e1e');
            root.style.setProperty('--text-light', 'var(--text-dark)');
            root.style.setProperty('--text-dark', '#eee');
            document.body.style.background = getComputedStyle(root).getPropertyValue('--bg-dark');
            document.body.style.color = getComputedStyle(root).getPropertyValue('--text-dark');
        }else{
            document.body.style.background = getComputedStyle(root).getPropertyValue('--bg-light');
            document.body.style.color = getComputedStyle(root).getPropertyValue('--text-light');
        }
        localStorage.setItem('theme', mode);
    }

    function applyFontSize(size){
        document.documentElement.style.fontSize = size+'px';
        localStorage.setItem('fontSize', size);
    }

    themeToggle.addEventListener('change',()=> {
        applyTheme(themeToggle.checked?'dark':'light');
    });

    fontSizeInput.addEventListener('input',()=> {
        applyFontSize(fontSizeInput.value);
    });

    resetBtn.addEventListener('click',()=> {
        localStorage.removeItem('theme');
        localStorage.removeItem('fontSize');
        init();
    });

    // 返回顶部
    window.addEventListener('scroll',()=> {
        if(document.documentElement.scrollTop>200){
            topBtn.style.display='flex';
        }else{
            topBtn.style.display='none';
        }
    });
    topBtn.addEventListener('click',()=> {
        window.scrollTo({top:0, behavior:'smooth'});
    });

    init();
})();
</script>
</body>
</html>
